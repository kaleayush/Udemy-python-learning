<h1>
    final resilt
</h1>
<body>
    {% for key, value in data.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
    {% endfor %}
    <p>Marks: {{ data.marks }}</p>
    <p>Result: {{ data.result }}</p>
    {% if score >= 50 %}
        <p>Congratulations! You have passed.</p>
    {% else %}
        <p>Sorry, you have failed.</p>
    {% endif %}
</body>
